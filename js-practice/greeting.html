<!DOCTYPE html>
<html>
<body>

<h2 id="greeting"></h2>

<script>
  const hour = new Date().getHours();
  let message = "";

  if (hour < 12) {
    message = "Good Morning";
  } else if (hour < 18) {
    message = "Good Afternoon";
  } else {
    message = "Good Evening";
  }

  document.getElementById("greeting").innerText = message;
</script>

</body>
</html>
