<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fetch Users(Check Console)</title>
</head>
<body>
   <h2>Fetch Users(Check Console)</h2> 

   <script>
    fetch("https://jsonplaceholder.typicode.com/users")
    .then(response => response.json())
    .then(data => {
        console.log(data);
    })
    .catch(error => {
        console.log("Error:" , error);
    });
   </script>
</body>

</html>
